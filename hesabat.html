<!DOCTYPE html>
<html lang="az">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>UMNA LLC - Hesabatlar</title>

   <link rel="stylesheet" href="css/bootstrap.min.css">
   <link rel="stylesheet" href="css/style.css">
   <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css">

   <style>
      .report_section{
         padding:80px 0;
         background:#f5f7fb;
      }

      .report_title{
         text-align:center;
         font-size:32px;
         font-weight:700;
         margin-bottom:10px;
      }

      .report_sub{
         text-align:center;
         margin-bottom:40px;
         color:#666;
      }

      .search_box{
         max-width:500px;
         margin:0 auto 30px auto;
      }

      .search_box input{
         width:100%;
         padding:12px 15px;
         border-radius:10px;
         border:1px solid #ddd;
      }

      .pdf_grid{
         display:grid;
         grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
         gap:20px;
      }

      .pdf_card{
         background:#fff;
         padding:20px;
         border-radius:12px;
         box-shadow:0 10px 25px rgba(0,0,0,0.08);
         transition:0.2s;
      }

      .pdf_card:hover{
         transform:translateY(-5px);
      }

      .pdf_icon{
         font-size:40px;
         color:#ed1c24;
         margin-bottom:10px;
      }

      .pdf_title{
         font-weight:600;
         margin-bottom:10px;
      }

      .pdf_btn a{
         display:inline-block;
         padding:8px 14px;
         background:#272b91;
         color:#fff;
         border-radius:6px;
         text-decoration:none;
      }

      .pdf_btn a:hover{
         background:#ed1c24;
      }

      .hidden{
         display:none !important;
      }
   </style>
</head>

<body>

<!-- HEADER (kopyaladığın navbarı buraya koyabilirsin) -->

<div class="report_section">
   <div class="container">

      <h1 class="report_title">Hesabatlar</h1>
      <p class="report_sub">UMNA MMC maliyyə hesabat sənədləri</p>

      <!-- SEARCH -->
      <div class="search_box">
         <input type="text" id="searchInput" placeholder="Axtar: 2024, 2025, menfeet...">
      </div>

      <!-- PDF LIST -->
      <div class="pdf_grid" id="pdfGrid">

         <div class="pdf_card" data-name="2024 menfeet zarar">
            <div class="pdf_icon"><i class="fa fa-file-pdf-o"></i></div>
            <div class="pdf_title">UMNA Mənfəət Zərər 2024</div>
            <div class="pdf_btn">
               <a href="pdf/UMNA Menfeet zerer 2024.pdf" target="_blank">Aç / Yüklə</a>
            </div>
         </div>

         <div class="pdf_card" data-name="2025 menfeet zarar">
            <div class="pdf_icon"><i class="fa fa-file-pdf-o"></i></div>
            <div class="pdf_title">UMNA Mənfəət Zərər 2025</div>
            <div class="pdf_btn">
               <a href="pdf/UMNA Menfeet zerer 2025.pdf" target="_blank">Aç / Yüklə</a>
            </div>
         </div>

      </div>

   </div>
</div>

<script>
   const input = document.getElementById("searchInput");
   const cards = document.querySelectorAll(".pdf_card");

   input.addEventListener("keyup", function(){
      const value = this.value.toLowerCase();

      cards.forEach(card => {
         const name = card.getAttribute("data-name");
         if(name.toLowerCase().includes(value)){
            card.classList.remove("hidden");
         } else {
            card.classList.add("hidden");
         }
      });
   });
</script>

</body>
</html>
